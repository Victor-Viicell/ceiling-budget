# Deploys the static site to GitHub Pages.
# Source of truth: https://github.com/actions/deploy-pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch (GitHub Pages requirement)
  push:
    branches: ["master", "main"]
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Required permissions for GitHub Pages deployment with OIDC
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do NOT cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only the deployable site. Excludes the workflow file,
          # any future tooling (package.json, server.ts, node_modules, etc.)
          # and keeps the published surface clean.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
